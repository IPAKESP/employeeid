<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee ID Card Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Fira Sans', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            padding: 20px 0;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .controls input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 250px;
            font-family: 'Fira Sans', sans-serif;
        }

        .controls button {
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #387c47;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Fira Sans', sans-serif;
            transition: background 0.3s;
        }
        
        .controls button:hover {
            opacity: 0.9;
        }

        /* --- 54x86 ASPECT RATIO EXACT CARD DESIGN --- */
        .card-container {
            width: 540px; 
            height: 860px; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background-color: white;
            overflow: hidden;
        }

        .card-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
        }

        .photo-container {
            position: absolute;
            top: 171px; 
            left: 0;
            right: 0;
            margin: 0 auto;
            width: 270px;   
            height: 270px;  
            z-index: 10;
        }

        #cardPhoto {
            position: absolute;
            top: 0;        
            left: 0;       
            width: 100%;    
            height: 100%;   
            object-fit: cover;
            border-radius: 18px; 
            z-index: 1; 
        }

        .photo-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; 
            pointer-events: none; 
        }

        /* Text Section */
        .text-section {
            position: absolute;
            top: 502px; 
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .emp-name {
            font-family: 'Bebas Neue', sans-serif;
            color: #3f7b47; 
            font-size: 65px; 
            font-weight: 400;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1.5px;
            line-height: 1; 
            transition: color 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .emp-title {
            font-family: 'Fira Sans', sans-serif;
            color: #2b2b2b;
            font-size: 27px; 
            font-weight: 600;
            text-transform: uppercase;
            margin: -2px 0 35px 0; 
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* --- UPDATED DETAILS TABLE --- */
        .details-table {
            margin: 0 auto; /* Table hamesha center me rahega */
            text-align: left; /* Table ke andar text left aligned rahega */
            font-size: 21px; 
            color: #333;
            border-spacing: 0 11px; 
            /* Fixed width hata di taake chota text bilkul center me aye */
        }

        .details-table td {
            vertical-align: top; /* Text ko top se shuru karega */
            padding: 0 6px; /* Halki si space rakhi hai */
        }

        /* 1st Column (Labels like "Department") */
        .details-table td:first-child {
            font-weight: 700;
            color: #2b2b2b;
            white-space: nowrap; /* Ye line break nahi hogi */
        }

        /* 2nd Column (Colon ':') */
        .details-table td:nth-child(2) {
            text-align: center;
            white-space: nowrap;
        }

        /* 3rd Column (Values) */
        .details-table td:last-child {
            max-width: 260px; /* Sirf limit lagai hai, agar naam chota hai to column bhi chota rahega */
            white-space: normal;
            word-wrap: break-word; /* Lambay naam ko automatically break karega */
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="inputId" placeholder="Enter Employee ID (e.g. 1011)">
        <button onclick="generateCard()">Generate Card</button>
        <button onclick="downloadCard()" style="background-color: #8bc63f; color: #111;">Download 4K Quality</button>
    </div>

    <div class="card-container" id="idCard">
        
        <img class="card-bg-img" id="cardBg" src="ipak_group.jpg" alt="Background" crossorigin="anonymous">
        
        <div class="photo-container">
            <!-- Employee Photo -->
            <img id="cardPhoto" src="https://via.placeholder.com/300?text=Photo+Here" alt="Employee Photo" crossorigin="anonymous">
            <!-- Border/Frame image -->
            <img class="photo-frame" id="photoFrame" src="rec_ipak.png" alt="Photo Border" crossorigin="anonymous">
        </div>

        <div class="text-section">
            <h1 class="emp-name" id="cardName">ANSER ALI SHAH</h1>
            <p class="emp-title" id="cardDesignation">MANAGER PLANNING</p>
            
            <table class="details-table">
                <tr>
                    <td>Employee ID</td>
                    <td>:</td>
                    <td id="cardEmpId">1011</td>
                </tr>
                <tr>
                    <td>Department</td>
                    <td>:</td>
                    <td id="cardDepartment">Planning & Dispatch</td>
                </tr>
            </table>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnbrul58r8BMQrtwQUQrMG1lFv9EMJubGGnCSDOrO-41l2z2j2VhM3NraYEenbGT5rxuL3AN0qVbvl/pub?output=csv';

        // Function to auto-shrink text so it fits on one line
        function autoShrink(element, defaultFontSize) {
            element.style.fontSize = defaultFontSize + 'px'; // Reset to default first
            let currentSize = defaultFontSize;
            
            // Jab tak text container se bahar nikal raha hai, font chota karte raho
            while (element.scrollWidth > element.clientWidth && currentSize > 12) {
                currentSize--;
                element.style.fontSize = currentSize + 'px';
            }
        }

        async function generateCard() {
            const empIdInput = document.getElementById('inputId').value.trim();
            if(!empIdInput) return alert("Please enter Employee ID.");

            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/);
                
                let found = false;
                for(let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(','); 
                    if(cols.length < 4) continue;
                    
                    const name = cols[0] ? cols[0].trim().replace(/^"|"$/g, '') : 'UNKNOWN';
                    const designation = cols[1] ? cols[1].trim().replace(/^"|"$/g, '') : 'UNKNOWN';
                    const id = cols[2] ? cols[2].trim().replace(/^"|"$/g, '') : '';
                    const department = cols[3] ? cols[3].trim().replace(/^"|"$/g, '') : 'UNKNOWN';
                    
                    // Assumed company is in the 5th column (Index 4)
                    const company = cols[4] ? cols[4].trim().replace(/^"|"$/g, '').toLowerCase() : 'ipak_group'; 
                    
                    if(id === empIdInput) {
                        found = true;
                        
                        const nameEl = document.getElementById('cardName');
                        const desigEl = document.getElementById('cardDesignation');
                        const frameEl = document.getElementById('photoFrame'); 
                        
                        nameEl.innerText = name;
                        desigEl.innerText = designation;
                        
                        // --- DYNAMIC NAME COLOR & FRAME LOGIC ---
                        if (company === 'gpak') {
                            nameEl.style.color = '#1f396c';
                            frameEl.src = 'rec_gpak.png';
                        } else if (company === 'cpak') {
                            nameEl.style.color = '#c42d35';
                            frameEl.src = 'rec_cpak.png';
                        } else if (company === 'petpak') {
                            nameEl.style.color = '#f36c35';
                            frameEl.src = 'rec_petpak.png';
                        } else {
                            nameEl.style.color = '#3f7b47'; // Default Green
                            frameEl.src = 'rec_ipak.png';
                        }

                        // Text laganay ke baad Auto-Shrink chalayen (taky 1 line me fit ho)
                        autoShrink(nameEl, 65);
                        autoShrink(desigEl, 27);
                        
                        document.getElementById('cardEmpId').innerText = id;
                        document.getElementById('cardDepartment').innerText = department;
                        
                        // Background image dynamically set
                        const bgImageName = company + '.jpg';
                        document.getElementById('cardBg').src = bgImageName;
                        // Default error handling for background
                        document.getElementById('cardBg').onerror = function() {
                            this.src = 'ipak_group.jpg'; 
                        }
                        
                        // Error handling for frame
                        frameEl.onerror = function() {
                            this.src = 'rec_ipak.png'; 
                        }
                        
                        // GitHub direct link setup for employee photo
                        document.getElementById('cardPhoto').src = 'https://raw.githubusercontent.com/IPAKESP/employeeid/main/ID_Card_System/photos/' + id + '.jpg';
                        
                        document.getElementById('cardPhoto').onerror = function() {
                            this.src = 'https://via.placeholder.com/300?text=No+Photo';
                        }
                        break;
                    }
                }
                if(!found) alert("Employee ID record not found.");
            } catch (error) {
                alert("Network error fetching Google Sheet.");
            }
        }

        function downloadCard() {
            window.scrollTo(0, 0); 
            
            const card = document.getElementById('idCard');
            const empId = document.getElementById('cardEmpId').innerText;
            
            html2canvas(card, { 
                scale: 6, // 4K+ quality
                useCORS: true, 
                backgroundColor: null,
                allowTaint: true,
                scrollX: 0, 
                scrollY: 0  
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `ID_Card_${empId}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            });
        }
    </script>
</body>
</html>
