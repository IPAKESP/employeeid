<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee ID Card Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Fira Sans', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            padding: 20px 0;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .controls input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 250px;
            font-family: 'Fira Sans', sans-serif;
        }

        .controls button {
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #387c47;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Fira Sans', sans-serif;
            transition: background 0.3s;
        }
        
        .controls button:hover {
            opacity: 0.9;
        }

        /* --- 54x86 ASPECT RATIO EXACT CARD DESIGN --- */
        .card-container {
            /* 54mm x 86mm ratio scaled up for high-res web rendering */
            width: 540px; 
            height: 860px; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background-color: white;
            overflow: hidden;
        }

        .card-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
        }

        /* --- UPDATED PHOTO AREA WITH FRAME --- */
        .photo-container {
            position: absolute;
            top: 171px; /* Scaled down proportionally */
            left: 0;
            right: 0;
            margin: 0 auto;
            width: 270px;   
            height: 270px;  
            z-index: 10;
        }

        #cardPhoto {
            position: absolute;
            /* Photo ko frame ke stroke/border ke peechay chupane ke liye thoda andar kiya hai */
            top: 2%;       
            left: 2%;      
            width: 96%;    
            height: 96%;   
            object-fit: cover;
            /* Aap is border-radius ko apne rec.png ki golayi k hisaab se kam/zyada kar sakte hain */
            border-radius: 18px; 
            z-index: 1; /* Employee photo piche rahegi */
        }

        .photo-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* Border/frame uper aayega */
            pointer-events: none; /* Mouse clicks isko block nahi karenge */
        }

        /* Text Section */
        .text-section {
            position: absolute;
            top: 502px; /* Scaled down proportionally */
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .emp-name {
            font-family: 'Bebas Neue', sans-serif;
            color: #3f7b47;
            font-size: 65px; /* Scaled for 540px width */
            font-weight: 400;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1.5px;
            line-height: 1; 
        }

        .emp-title {
            font-family: 'Fira Sans', sans-serif;
            color: #2b2b2b;
            font-size: 27px; 
            font-weight: 600;
            text-transform: uppercase;
            margin: -2px 0 35px 0; 
            letter-spacing: 0.5px;
        }

        /* Details Table */
        .details-table {
            margin: 0 auto;
            text-align: left;
            font-size: 21px; /* Scaled up */
            color: #333;
            border-spacing: 0 11px; 
        }

        .details-table td {
            padding: 0 10px;
        }

        .details-table td:first-child {
            font-weight: 700;
            color: #2b2b2b;
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="inputId" placeholder="Enter Employee ID (e.g. 1011)">
        <button onclick="generateCard()">Generate Card</button>
        <button onclick="downloadCard()" style="background-color: #8bc63f; color: #111;">Download 4K Quality</button>
    </div>

    <div class="card-container" id="idCard">
        
        <!-- Yahan par id="cardBg" add kiya gaya hai -->
        <img class="card-bg-img" id="cardBg" src="ipak_group.jpg" alt="Background" crossorigin="anonymous">
        
        <div class="photo-container">
            <!-- Employee Photo -->
            <img id="cardPhoto" src="https://via.placeholder.com/300?text=Photo+Here" alt="Employee Photo" crossorigin="anonymous">
            
            <!-- Border/Frame image -->
            <img class="photo-frame" src="rec.png" alt="Photo Border" crossorigin="anonymous">
        </div>

        <div class="text-section">
            <h1 class="emp-name" id="cardName">ANSER ALI SHAH</h1>
            <p class="emp-title" id="cardDesignation">MANAGER PLANNING</p>
            
            <table class="details-table">
                <tr>
                    <td>Employee ID</td>
                    <td>:</td>
                    <td id="cardEmpId">1011</td>
                </tr>
                <tr>
                    <td>Department</td>
                    <td>:</td>
                    <td id="cardDepartment">Planning & Dispatch</td>
                </tr>
            </table>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnbrul58r8BMQrtwQUQrMG1lFv9EMJubGGnCSDOrO-41l2z2j2VhM3NraYEenbGT5rxuL3AN0qVbvl/pub?output=csv';

        async function generateCard() {
            const empIdInput = document.getElementById('inputId').value.trim();
            if(!empIdInput) return alert("Please enter Employee ID.");

            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/);
                
                let found = false;
                for(let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(','); 
                    if(cols.length < 4) continue;
                    
                    const name = cols[0] ? cols[0].trim().replace(/^"|"$/g, '') : 'UNKNOWN';
                    const designation = cols[1] ? cols[1].trim().replace(/^"|"$/g, '') : 'UNKNOWN';
                    const id = cols[2] ? cols[2].trim().replace(/^"|"$/g, '') : '';
                    const department = cols[3] ? cols[3].trim().replace(/^"|"$/g, '') : 'UNKNOWN';
                    
                    // Assumed company is in the 5th column (Index 4). Agar index change ho tou yahan update karein.
                    const company = cols[4] ? cols[4].trim().replace(/^"|"$/g, '').toLowerCase() : 'ipak_group'; 
                    
                    if(id === empIdInput) {
                        found = true;
                        
                        document.getElementById('cardName').innerText = name;
                        document.getElementById('cardDesignation').innerText = designation;
                        document.getElementById('cardEmpId').innerText = id;
                        document.getElementById('cardDepartment').innerText = department;
                        
                        // Background image dynamically set ho rahi hai
                        const bgImageName = company + '.jpg';
                        document.getElementById('cardBg').src = bgImageName;
                        // Default error handling for background
                        document.getElementById('cardBg').onerror = function() {
                            this.src = 'ipak_group.jpg'; // agar image na mile tou default lag jaye
                        }
                        
                        // GitHub direct link setup for employee photo
                        document.getElementById('cardPhoto').src = 'https://raw.githubusercontent.com/IPAKESP/employeeid/main/ID_Card_System/photos/' + id + '.jpg';
                        
                        document.getElementById('cardPhoto').onerror = function() {
                            this.src = 'https://via.placeholder.com/300?text=No+Photo';
                        }
                        break;
                    }
                }
                if(!found) alert("Employee ID record not found.");
            } catch (error) {
                alert("Network error fetching Google Sheet.");
            }
        }

        function downloadCard() {
            window.scrollTo(0, 0); 
            
            const card = document.getElementById('idCard');
            const empId = document.getElementById('cardEmpId').innerText;
            
            html2canvas(card, { 
                scale: 6, // 4K+ quality
                useCORS: true, 
                backgroundColor: null,
                allowTaint: true,
                scrollX: 0, 
                scrollY: 0  
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `ID_Card_${empId}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
            });
        }
    </script>
</body>
</html>
